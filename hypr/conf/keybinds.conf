

# Exit Hyprland Session
bind = SUPER SHIFT, RETURN, exit


# Variables
$terminal = kitty -1
$terminal2 = alacritty
$browser = zen-browser

$mainMod = SUPER

# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = CTRL ALT, T, exec, $terminal2
bind = $mainMod, B, exec, $browser


# Ambxst
bind = SUPER, M, exec, ambxst run launcher # Custom Bind 0
bind = SUPER, D, exec, ambxst run dashboard # Custom Bind 1
bind = SUPER, A, exec, ambxst run assistant # Custom Bind 2
bind = SUPER, V, exec, ambxst run clipboard # Custom Bind 3
bind = SUPER, PERIOD, exec, ambxst run emoji # Custom Bind 4
bind = SUPER, N, exec, ambxst run notes # Custom Bind 5
bind = SUPER, T, exec, ambxst run tmux # Custom Bind 6
bind = SUPER, COMMA, exec, ambxst run wallpapers # Custom Bind 7
bind = SUPER, TAB, exec, ambxst run overview # Custom Bind 8
bind = SUPER, ESCAPE, exec, ambxst run powermenu # Custom Bind 9
bind = SUPER SHIFT, C, exec, ambxst run config # Custom Bind 10
bind = SUPER, L, exec, loginctl lock-session # Custom Bind 11
bind = SUPER, S, exec, ambxst run tools # Custom Bind 12
bind = SUPER SHIFT, S, exec, ambxst run screenshot # Custom Bind 13
bind = SUPER SHIFT, R, exec, ambxst run screenrecord # Custom Bind 14
bind = SUPER SHIFT, A, exec, ambxst run lens # Custom Bind 15
bind = SUPER ALT, B, exec, ambxst reload # Custom Bind 16
bind = SUPER CTRL ALT, B, exec, ambxst quit # Custom Bind 17

bind = , XF86AudioPlay, exec, playerctl play-pause # Custom Bind 57
bind = , XF86AudioPrev, exec, playerctl previous # Custom Bind 58
bind = , XF86AudioNext, exec, playerctl next # Custom Bind 59
bind = , XF86AudioMedia, exec, playerctl play-pause # Custom Bind 60
bind = , XF86AudioStop, exec, playerctl stop # Custom Bind 61
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+ # Custom Bind 62
bind = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%- # Custom Bind 63
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Custom Bind 64
bind = , XF86MonBrightnessUp, exec, ambxst brightness +5 # Custom Bind 65
bind = , XF86MonBrightnessDown, exec, ambxst brightness -5 # Custom Bind 66
bind = , XF86Calculator, exec, notify-send "Soon" # Custom Bind 67

bind = , switch:Lid Switch, exec, loginctl lock-session # Custom Bind 70
bind = , switch:on:Lid Switch, exec, axctl monitor set-dpms 0 0 # Custom Bind 71
bind = , switch:off:Lid Switch, exec, axctl monitor set-dpms 0 1 # Custom Bind 72


# Windows
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, forcekillactive

# Workspaces
bind = $mainMod, 1, workspace, 1  # Open workspace 1
bind = $mainMod, 2, workspace, 2  # Open workspace 2
bind = $mainMod, 3, workspace, 3  # Open workspace 3
bind = $mainMod, 4, workspace, 4  # Open workspace 4
bind = $mainMod, 5, workspace, 5  # Open workspace 5
bind = $mainMod, 6, workspace, 6  # Open workspace 6
bind = $mainMod, 7, workspace, 7  # Open workspace 7
bind = $mainMod, 8, workspace, 8  # Open workspace 8
bind = $mainMod, 9, workspace, 9  # Open workspace 9
bind = $mainMod, 0, workspace, 10 # Open workspace 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1  # Move active window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2  # Move active window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3  # Move active window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4  # Move active window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5  # Move active window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6  # Move active window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7  # Move active window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8  # Move active window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9  # Move active window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move active window to workspace 10

bind = $mainMod SHIFT, left, resizeactive, -40 0
bind = $mainMod SHIFT, right, resizeactive, 40 0
bind = $mainMod SHIFT, up, resizeactive, 0 -40
bind = $mainMod SHIFT, down, resizeactive, 0 40

bind = ALT, left, movewindow, l
bind = ALT, right, movewindow, r
bind = ALT, up, movewindow, u
bind = ALT, down, movewindow, d

bind = $mainMod, Tab, workspace, m+1       # Open next workspace
bind = $mainMod SHIFT, Tab, workspace, m-1 # Open previous workspace

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, J, layoutmsg, swapsplit


# System keybinds
bind = $mainMod SHIFT, l, exec, hyprlock
bind = $mainMod SHIFT, i, exec, hyprshot -m region
bind = $mainMod SHIFT, p, exec, hyprpicker --autocopy

bind = $mainMod SHIFT, s, exec, systemctl suspend

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10
